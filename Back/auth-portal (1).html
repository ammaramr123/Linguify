<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Auth Portal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --bg:       #050a0e;
    --surface:  #0c1419;
    --border:   #1a3040;
    --accent:   #00d4ff;
    --accent2:  #00ff88;
    --danger:   #ff4466;
    --text:     #c8dde8;
    --dim:      #4a6070;
    --glow:     0 0 20px rgba(0,212,255,.25);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Share Tech Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* animated grid background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridScroll 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridScroll { to { background-position: 40px 40px; } }

  /* scan line */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: linear-gradient(transparent 50%, rgba(0,0,0,.04) 50%);
    background-size: 100% 4px;
    pointer-events: none;
    opacity: .4;
  }

  .card {
    position: relative;
    width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    padding: 36px 40px 40px;
    box-shadow: var(--glow), 0 0 60px rgba(0,0,0,.6);
    animation: fadeUp .5s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } }

  .card-corner {
    position: absolute;
    width: 10px; height: 10px;
    border-color: var(--accent);
    border-style: solid;
  }
  .card-corner.tl { top:-1px; left:-1px; border-width: 2px 0 0 2px; }
  .card-corner.tr { top:-1px; right:-1px; border-width: 2px 2px 0 0; }
  .card-corner.bl { bottom:-1px; left:-1px; border-width: 0 0 2px 2px; }
  .card-corner.br { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }

  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .25em;
    color: var(--dim);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,.5);
    margin-bottom: 28px;
    letter-spacing: .05em;
  }

  /* tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: .1em;
    padding: 10px 0;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* panels */
  .panel { display: none; }
  .panel.active { display: block; }

  /* form elements */
  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 11px;
    letter-spacing: .15em;
    color: var(--dim);
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  input {
    width: 100%;
    background: rgba(0,212,255,.04);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,212,255,.1);
  }
  input::placeholder { color: var(--dim); }

  .styled-select {
    width: 100%;
    background: rgba(0,212,255,.04);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    cursor: pointer;
  }
  .styled-select option { background: #0c1419; }

  /* button */
  .btn {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .2em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all .25s;
    margin-top: 6px;
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-101%);
    transition: transform .25s;
    z-index: 0;
  }
  .btn:hover::before { transform: translateX(0); }
  .btn:hover { color: var(--bg); box-shadow: var(--glow); }
  .btn span { position: relative; z-index: 1; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }

  /* status */
  .status {
    margin-top: 16px;
    padding: 10px 14px;
    font-size: 12px;
    border-left: 3px solid;
    display: none;
  }
  .status.error { border-color: var(--danger); color: var(--danger); background: rgba(255,68,102,.08); }
  .status.success { border-color: var(--accent2); color: var(--accent2); background: rgba(0,255,136,.06); }

  /* JWT decode display */
  .jwt-box {
    margin-top: 20px;
    display: none;
  }
  .jwt-box-label {
    font-size: 10px;
    letter-spacing: .2em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .jwt-payload {
    background: rgba(0,0,0,.4);
    border: 1px solid var(--border);
    padding: 14px;
    font-size: 12px;
    color: var(--accent2);
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .role-badge {
    display: inline-block;
    margin-top: 12px;
    padding: 4px 14px;
    font-size: 11px;
    letter-spacing: .15em;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
  }
  .role-badge.admin { background: rgba(255,165,0,.15); border: 1px solid orange; color: orange; }
  .role-badge.user  { background: rgba(0,212,255,.1);  border: 1px solid var(--accent); color: var(--accent); }

  /* redirect overlay */
  .redirect-overlay {
    display: none;
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity:0; } }
  .redirect-overlay.show { display: flex; }
  .redirect-msg {
    font-family: 'Rajdhani', sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: .1em;
  }
  .redirect-msg.admin { color: orange; text-shadow: 0 0 30px rgba(255,165,0,.5); }
  .redirect-msg.user  { color: var(--accent); text-shadow: 0 0 30px rgba(0,212,255,.5); }
  .redirect-sub {
    font-size: 13px;
    color: var(--dim);
    letter-spacing: .15em;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* mock pages */
  .mock-page {
    display: none;
    position: fixed; inset: 0;
    z-index: 1000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  .mock-page.show { display: flex; }
  .mock-page.admin-pg { background: #0a0800; }
  .mock-page.user-pg  { background: #00050a; }

  .mock-page h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 48px;
    font-weight: 700;
    letter-spacing: .1em;
  }
  .admin-pg h1 { color: orange; text-shadow: 0 0 40px rgba(255,165,0,.6); }
  .user-pg  h1 { color: var(--accent); text-shadow: 0 0 40px rgba(0,212,255,.6); }
  .mock-page p { color: var(--dim); font-size: 13px; letter-spacing: .1em; }
  .mock-page .payload-display {
    background: rgba(0,0,0,.5);
    border: 1px solid var(--border);
    padding: 16px 22px;
    font-size: 12px;
    color: var(--accent2);
    max-width: 520px;
    line-height: 1.7;
    white-space: pre-wrap;
  }
  .back-btn {
    padding: 8px 24px;
    background: transparent;
    border: 1px solid var(--dim);
    color: var(--dim);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    letter-spacing: .1em;
    transition: all .2s;
  }
  .back-btn:hover { border-color: var(--text); color: var(--text); }
</style>
</head>
<body>

<!-- ─── REDIRECT OVERLAY ─── -->
<div class="redirect-overlay" id="redirectOverlay">
  <div class="spinner"></div>
  <div class="redirect-msg" id="redirectMsg">ACCESS GRANTED</div>
  <div class="redirect-sub" id="redirectSub">Redirecting to dashboard...</div>
</div>

<!-- ─── ADMIN PAGE ─── -->
<div class="mock-page admin-pg" id="adminPage">
  <h1>⚙ ADMIN PANEL</h1>
  <p>ROLE: ADMINISTRATOR — FULL ACCESS</p>
  <div class="payload-display" id="adminPayload"></div>
  <button class="back-btn" onclick="logout()">← LOGOUT</button>
</div>

<!-- ─── USER PAGE ─── -->
<div class="mock-page user-pg" id="userPage">
  <h1>◈ USER PORTAL</h1>
  <p>ROLE: USER — STANDARD ACCESS</p>
  <div class="payload-display" id="userPayload"></div>
  <button class="back-btn" onclick="logout()">← LOGOUT</button>
</div>

<!-- ─── MAIN CARD ─── -->
<div class="card" id="mainCard">
  <div class="card-corner tl"></div>
  <div class="card-corner tr"></div>
  <div class="card-corner bl"></div>
  <div class="card-corner br"></div>

  <div class="logo">localhost:8080 · api</div>
  <div class="title">AUTH PORTAL</div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('login')">LOGIN</button>
    <button class="tab" onclick="switchTab('register')">REGISTER</button>
  </div>

  <!-- LOGIN PANEL -->
  <div class="panel active" id="panel-login">
    <div class="field">
      <label>Username / Email</label>
      <input type="text" id="login-user" placeholder="enter identifier" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••"/>
    </div>
    <button class="btn" onclick="doLogin()"><span>AUTHENTICATE</span></button>
    <div class="status" id="login-status"></div>
    <div class="jwt-box" id="login-jwt">
      <div class="jwt-box-label">Decoded JWT Payload</div>
      <div class="jwt-payload" id="login-payload-text"></div>
      <div id="login-role-badge"></div>
    </div>
  </div>

  <!-- REGISTER PANEL -->
  <div class="panel" id="panel-register">
    <div class="field">
      <label>Register As</label>
      <select id="reg-type" class="styled-select">
        <option value="user">User</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="reg-user" placeholder="choose username" autocomplete="off"/>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="reg-email" placeholder="user@example.com"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="reg-pass" placeholder="••••••••"/>
    </div>
    <button class="btn" onclick="doRegister()"><span>REGISTER</span></button>
    <div class="status" id="reg-status"></div>
  </div>
</div>

<script>
const BASE = 'http://localhost:8080';

/* ── tab switch ── */
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
}

/* ── JWT decode (no verify — payload only) ── */
function decodeJWT(token) {
  try {
    const parts = token.split('.');
    if (parts.length !== 3) return null;
    const b64 = parts[1].replace(/-/g,'+').replace(/_/g,'/');
    const json = decodeURIComponent(atob(b64).split('').map(c =>
      '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)
    ).join(''));
    return JSON.parse(json);
  } catch { return null; }
}

/* ── show status ── */
function showStatus(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'status ' + type;
  el.style.display = 'block';
}

/* ── redirect logic ── */
function redirectByRole(payload, token) {
  const role = (payload.role || payload.Role || payload.roles || '').toString().toLowerCase();
  const overlay = document.getElementById('redirectOverlay');
  const msg     = document.getElementById('redirectMsg');
  const sub     = document.getElementById('redirectSub');

  const isAdmin = role.includes('admin');

  msg.textContent = isAdmin ? 'ADMIN ACCESS GRANTED' : 'ACCESS GRANTED';
  msg.className = 'redirect-msg ' + (isAdmin ? 'admin' : 'user');
  sub.textContent = isAdmin ? 'Redirecting to Admin Panel...' : 'Redirecting to User Portal...';
  overlay.classList.add('show');

  setTimeout(() => {
    overlay.classList.remove('show');
    const payloadStr = JSON.stringify(payload, null, 2);
    if (isAdmin) {
      document.getElementById('adminPayload').textContent = payloadStr;
      document.getElementById('adminPage').classList.add('show');
    } else {
      document.getElementById('userPayload').textContent = payloadStr;
      document.getElementById('userPage').classList.add('show');
    }
    document.getElementById('mainCard').style.display = 'none';
  }, 1800);
}

/* ── LOGIN ── */
async function doLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const jwtBox   = document.getElementById('login-jwt');
  jwtBox.style.display = 'none';

  if (!username || !password) {
    showStatus('login-status','⚠ Fill in all fields.','error'); return;
  }
  showStatus('login-status','Connecting...','success');

  try {
    const res = await fetch(`${BASE}/Api/Auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await res.text()

    console.log(data); // for debugging

    if (!res.ok) {
      showStatus('login-status', `✗ ${data.message || data.error || 'Login failed ('+res.status+')'}`, 'error');
      return;
    }

    /* find token — handle various response shapes */
    const token = data ;

    if (!token) {
      showStatus('login-status', '✗ No token in response. Raw: ' + JSON.stringify(data).slice(0,120), 'error');
      return;
    }

    const payload = decodeJWT(token);
    if (!payload) {
      showStatus('login-status','✗ Could not decode JWT.','error'); return;
    }

    showStatus('login-status','✔ Authenticated! Decoding token...','success');

    /* show decoded payload briefly */
    const role = (payload.role || payload.Role || payload.roles || 'unknown').toString().toLowerCase();
    document.getElementById('login-payload-text').textContent = JSON.stringify(payload, null, 2);
    const badge = document.getElementById('login-role-badge');
    badge.innerHTML = `<span class="role-badge ${role.includes('admin')?'admin':'user'}">ROLE: ${role.toUpperCase()}</span>`;
    jwtBox.style.display = 'block';

    setTimeout(() => redirectByRole(payload, token), 900);

  } catch (err) {
    showStatus('login-status', '✗ Network error — is the server running? ' + err.message, 'error');
  }
}

/* ── REGISTER ── */
async function doRegister() {
  const type     = document.getElementById('reg-type').value;
  const username = document.getElementById('reg-user').value.trim();
  const email    = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-pass').value;

  if (!username || !email || !password) {
    showStatus('reg-status','⚠ Fill in all fields.','error'); return;
  }
  showStatus('reg-status','Sending registration...','success');

  const endpoint = type === 'admin'
    ? `${BASE}/Api/Auth/Admin/register`
    : `${BASE}/Api/Auth/User/register`;

  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });
    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      showStatus('reg-status', `✗ ${data.message || data.error || 'Registration failed ('+res.status+')'}`, 'error');
      return;
    }
    showStatus('reg-status','✔ Registered! Switch to Login tab to authenticate.','success');
  } catch (err) {
    showStatus('reg-status','✗ Network error — is the server running? ' + err.message,'error');
  }
}

/* ── enter key support ── */
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const loginActive = document.getElementById('panel-login').classList.contains('active');
  if (loginActive) doLogin(); else doRegister();
});

/* ── logout ── */
function logout() {
  document.querySelectorAll('.mock-page').forEach(p => p.classList.remove('show'));
  document.getElementById('mainCard').style.display = '';
  document.getElementById('login-jwt').style.display = 'none';
  document.getElementById('login-status').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}
</script>
</body>
</html>
